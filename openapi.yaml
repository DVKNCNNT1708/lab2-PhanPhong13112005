openapi: 3.1.0
info:
  title: Smart Campus — IoT Ingestion Service (B1)
  version: 1.0.0
  description: |
    API tiếp nhận và quản lý dữ liệu telemetry từ các thiết bị IoT.
    Cặp đàm phán: B1 (Provider) <-> B6 (Consumer).
  contact:
    name: Phan Lưu Phong - Nhóm 8
    email: phanphong@example.edu.vn
servers:
  - url: http://localhost:4010
    description: Prism mock server
    
# Thêm khối khai báo global tags để fix lỗi "operation-tag-defined"
tags:
  - name: telemetry
    description: Các API liên quan đến quản lý và tiếp nhận dữ liệu cảm biến
  - name: system
    description: Các API hệ thống và health-check

paths:
  /api/v1/telemetry:
    post:
      operationId: submitTelemetry
      summary: Gửi dữ liệu đo đạc
      # Thêm description để fix lỗi "operation-description"
      description: Tiếp nhận payload đa hình chứa dữ liệu đo đạc từ các thiết bị IoT.
      tags: [telemetry]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryPayload'
      responses:
        '201':
          description: Đã tiếp nhận dữ liệu thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAccepted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    get:
      operationId: listTelemetry
      summary: Lấy danh sách lịch sử dữ liệu
      description: Truy xuất danh sách dữ liệu cảm biến với hỗ trợ phân trang Cursor-based.
      tags: [telemetry]
      parameters:
        - name: cursor
          in: query
          schema:
            type: [string, "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Danh sách dữ liệu kèm phân trang cursor-based
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryPage'

  /api/v1/telemetry/{eventId}:
    get:
      operationId: getTelemetryById
      summary: Chi tiết một gói tin telemetry
      description: Lấy thông tin chi tiết của một event đo đạc cụ thể thông qua eventId (UUID).
      tags: [telemetry]
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Thành công
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/health:
    get:
      operationId: getHealth
      summary: Kiểm tra trạng thái service
      description: Endpoint dùng để load balancer hoặc các service khác health-check Ingestion Service.
      tags: [system]
      responses:
        '200':
          description: OK

components:
  schemas:
    TelemetryPayload:
      type: object
      required: [deviceId, sensorData, timestamp]
      properties:
        deviceId:
          type: string
          pattern: '^SENSOR-[0-9]{3}$'
        timestamp:
          type: string
          format: date-time
        sensorData:
          $ref: '#/components/schemas/SensorData'

    SensorData:
      oneOf:
        - $ref: '#/components/schemas/TemperatureData'
        - $ref: '#/components/schemas/HumidityData'
      discriminator:
        propertyName: sensorType
        mapping:
          temp: '#/components/schemas/TemperatureData'
          humid: '#/components/schemas/HumidityData'

    TemperatureData:
      type: object
      required: [sensorType, value]
      properties:
        sensorType:
          type: string
          const: temp
        value:
          type: number
        notes:
          type: [string, "null"]

    HumidityData:
      type: object
      required: [sensorType, percentage]
      properties:
        sensorType:
          type: string
          const: humid
        percentage:
          type: number
          minimum: 0
          maximum: 100

    TelemetryPage:
      type: object
      required: [items, hasMore]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TelemetryPayload'
        nextCursor:
          type: [string, "null"]
        hasMore:
          type: boolean

    EventAccepted:
      type: object
      required: [eventId, acceptedAt]
      properties:
        eventId:
          type: string
          format: uuid
        acceptedAt:
          type: string
          format: date-time

    Problem:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: [string, "null"] }

  responses:
    BadRequest:
      description: Lỗi cú pháp
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    NotFound:
      description: Không tìm thấy
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    UnprocessableEntity:
      description: Lỗi nghiệp vụ
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }